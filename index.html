<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram TTS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.4rem;
      color: #7dd3fc;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 24px; }

    /* Status bar */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e2332;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 10px 18px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 520px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }
    #status-text { font-size: 0.9rem; color: #94a3b8; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 520px;
      flex-wrap: wrap;
    }
    .controls label { font-size: 0.82rem; color: #64748b; display: block; margin-bottom: 4px; }
    .controls select, .controls input[type=range] {
      width: 100%;
      background: #1e2332;
      border: 1px solid #2d3748;
      color: #e2e8f0;
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 0.85rem;
    }
    .ctrl-group { flex: 1; min-width: 140px; }
    input[type=range] { padding: 6px 0; cursor: pointer; accent-color: #7dd3fc; }

    /* Enable button */
    #enable-btn {
      display: block;
      width: 100%;
      max-width: 520px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 24px;
      transition: opacity 0.2s, transform 0.1s;
    }
    #enable-btn:active { transform: scale(0.98); }
    #enable-btn:disabled { opacity: 0.4; cursor: default; }

    /* Messages feed */
    #feed {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-card {
      background: #1e2332;
      border: 1px solid #2d3748;
      border-left: 4px solid #3b82f6;
      border-radius: 10px;
      padding: 12px 16px;
      animation: slideIn 0.3s ease;
    }
    .msg-card.speaking { border-left-color: #22c55e; background: #1a2e1a; }
    @keyframes slideIn {
      from { opacity:0; transform: translateY(-8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg-meta { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .msg-from { color: #7dd3fc; font-weight: 600; }
    .msg-text { font-size: 0.95rem; line-height: 1.5; }

    /* Speaking indicator */
    #speaking-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      color: #22c55e;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    #speaking-indicator.active { display: flex; }
    .wave { display: flex; gap: 3px; align-items: flex-end; height: 18px; }
    .wave span {
      width: 3px; background: #22c55e; border-radius: 2px;
      animation: wave 0.8s ease-in-out infinite;
    }
    .wave span:nth-child(2) { animation-delay: 0.15s; }
    .wave span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes wave {
      0%,100% { height: 6px; } 50% { height: 18px; }
    }

    .empty-state {
      color: #475569;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <h1>📢 Telegram TTS</h1>
  <p class="subtitle">Автоматическая озвучка сообщений из чата</p>

  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Подключение...</span>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label>🗣 Голос</label>
      <select id="voice-select"><option>Загрузка...</option></select>
    </div>
    <div class="ctrl-group">
      <label>⚡ Скорость: <span id="rate-val">1.0</span></label>
      <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.0" />
    </div>
    <div class="ctrl-group">
      <label>🔊 Громкость: <span id="vol-val">100</span>%</label>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="1" />
    </div>
  </div>

  <button id="enable-btn">🎙 Включить автоозвучку</button>

  <div id="speaking-indicator">
    <div class="wave"><span></span><span></span><span></span></div>
    Озвучиваю...
  </div>

  <div id="feed">
    <p class="empty-state" id="empty">Ожидаю сообщения из Telegram...</p>
  </div>

<script>
  // ─── State ───────────────────────────────────────────────────────
  let ttsEnabled = false;
  let voices = [];
  const queue = [];
  let speaking = false;

  // ─── Elements ────────────────────────────────────────────────────
  const dot          = document.getElementById('dot');
  const statusText   = document.getElementById('status-text');
  const feed         = document.getElementById('feed');
  const empty        = document.getElementById('empty');
  const enableBtn    = document.getElementById('enable-btn');
  const voiceSelect  = document.getElementById('voice-select');
  const rateInput    = document.getElementById('rate');
  const volInput     = document.getElementById('volume');
  const rateVal      = document.getElementById('rate-val');
  const volVal       = document.getElementById('vol-val');
  const speakingInd  = document.getElementById('speaking-indicator');

  // ─── Voices ──────────────────────────────────────────────────────
  function loadVoices() {
    voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    voiceSelect.innerHTML = '';
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      // предпочитаем русский голос по умолчанию
      if (v.lang.startsWith('ru')) opt.selected = true;
      voiceSelect.appendChild(opt);
    });
  }
  speechSynthesis.addEventListener('voiceschanged', loadVoices);
  loadVoices();

  rateInput.addEventListener('input', () => rateVal.textContent = parseFloat(rateInput.value).toFixed(1));
  volInput.addEventListener('input', () => volVal.textContent = Math.round(volInput.value * 100));

  // ─── Enable button ───────────────────────────────────────────────
  enableBtn.addEventListener('click', () => {
    // Браузер требует жест пользователя для запуска AudioContext / speechSynthesis
    const test = new SpeechSynthesisUtterance('');
    speechSynthesis.speak(test);

    ttsEnabled = true;
    enableBtn.textContent = '✅ Озвучка включена';
    enableBtn.disabled = true;

    // Проговорить всё что накопилось в очереди
    processQueue();
  });

  // ─── TTS ─────────────────────────────────────────────────────────
  function processQueue() {
    if (!ttsEnabled || speaking || queue.length === 0) return;

    const { text, card } = queue.shift();
    speaking = true;
    speakingInd.classList.add('active');
    card.classList.add('speaking');

    const utter = new SpeechSynthesisUtterance(text);
    utter.voice  = voices[voiceSelect.value] || null;
    utter.rate   = parseFloat(rateInput.value);
    utter.volume = parseFloat(volInput.value);

    utter.onend = utter.onerror = () => {
      speaking = false;
      speakingInd.classList.remove('active');
      card.classList.remove('speaking');
      processQueue();
    };

    speechSynthesis.speak(utter);
  }

  function speakMessage(text, card) {
    queue.push({ text, card });
    processQueue();
  }

  // ─── UI: add message card ─────────────────────────────────────────
  function addCard(msg) {
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = 'msg-card';
    card.innerHTML = `
      <div class="msg-meta">
        <span class="msg-from">${escHtml(msg.from)}</span>
        <span>${escHtml(msg.time)}</span>
      </div>
      <div class="msg-text">${escHtml(msg.text)}</div>
    `;
    feed.prepend(card);

    // Ограничиваем ленту 30 сообщениями
    while (feed.children.length > 30) feed.removeChild(feed.lastChild);

    return card;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  // ─── WebSocket ────────────────────────────────────────────────────
  function connect() {
    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      dot.classList.add('connected');
      statusText.textContent = 'Подключено к серверу';
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      const card = addCard(msg);
      speakMessage(msg.text, card);
    };

    ws.onclose = () => {
      dot.classList.remove('connected');
      statusText.textContent = 'Соединение потеряно. Переподключение...';
      setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
